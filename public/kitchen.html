<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#F5EFE6">

<title>Kitchen — Stoveside</title>
<meta name="description" content="A home kitchen on Stoveside. Menu, hours, reviews, and pickup — all in one place.">
<meta property="og:type" content="restaurant">
<meta property="og:site_name" content="Stoveside">
<meta property="og:title" content="Kitchen on Stoveside">
<meta property="og:description" content="A permitted California home cook selling food under AB 626 (MEHKO).">
<meta property="og:image" content="https://stoveside.co/og-image.png">
<meta name="twitter:card" content="summary_large_image">

<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='14' fill='%23FF6B4A'/%3E%3Ctext x='16' y='22' font-family='Georgia,serif' font-size='20' font-weight='900' text-anchor='middle' fill='%23FFFFFF'%3ES%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;0,9..144,900;1,9..144,700&family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#F5EFE6; --bg-soft:#EDE5D8; --card:#FFFFFF;
  --ink:#1A1208; --ink-70:rgba(26,18,8,.7); --ink-50:rgba(26,18,8,.5); --ink-10:rgba(26,18,8,.08);
  --coral:#FF6B4A; --coral-deep:#E8553A; --sage:#8FA876;
  --r:14px; --r-lg:20px; --r-xl:28px;
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html { scroll-behavior: smooth; }
html, body { margin:0; padding:0; background:var(--bg); color:var(--ink); font-family:'DM Sans', system-ui, sans-serif; font-size:16px; line-height:1.55; -webkit-font-smoothing:antialiased; }
h1,h2,h3,h4 { font-family:'Fraunces', serif; font-weight:900; margin:0; color:var(--ink); letter-spacing:-0.02em; }
a { color:var(--coral); text-decoration:none; }
button { font:inherit; cursor:pointer; border:0; background:none; color:inherit; }
img { max-width:100%; display:block; }

.container { max-width: 820px; margin: 0 auto; padding: 0 20px 80px; }
.eyebrow { font-family:'DM Mono', monospace; font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-50); }
.text-muted { color: var(--ink-50); }
.badge { display:inline-flex; align-items:center; gap:6px; padding:4px 10px; background:var(--bg-soft); border-radius:999px; font-family:'DM Mono',monospace; font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--ink-70); }

.top-bar { display:flex; justify-content:space-between; align-items:center; padding: 16px 20px; }
.top-bar .brand { font-family:'Fraunces',serif; font-weight:900; font-size:22px; }
.top-bar a.btn { padding:8px 14px; border-radius:999px; background:var(--ink); color:#fff; font-weight:600; font-size:13px; }

.hero { width:100%; aspect-ratio: 16/8; background: var(--bg-soft) center/cover no-repeat; position: relative; }
.hero::after { content:''; position:absolute; inset:0; background: linear-gradient(180deg, rgba(0,0,0,0) 50%, rgba(0,0,0,.55) 100%); }
.hero-inner { position:absolute; left:0; right:0; bottom:0; padding: 24px 20px; color:#fff; z-index: 1; text-shadow: 0 2px 12px rgba(0,0,0,.4);}
.hero-inner h1 { font-size: 44px; line-height: 1; color: #fff; margin-bottom: 8px; }
.hero-inner h1 em { color: #FFD5C8; font-style: italic; }
.hero-inner .meta { opacity:.9; font-size:14px; font-family:'DM Mono',monospace; letter-spacing:.06em; }

.profile-row { display:flex; align-items:center; gap: 14px; margin-top: -36px; position:relative; z-index:2; padding: 0 20px; }
.avatar { width:72px; height:72px; border-radius:50%; background: var(--bg-soft) center/cover no-repeat; border:4px solid var(--bg); }

.stats-bar { display:flex; gap:18px; padding: 14px 20px 0; font-family:'DM Mono', monospace; font-size:12px; letter-spacing:.08em; text-transform:uppercase; color: var(--ink-50); }
.stats-bar b { color: var(--ink); }

section { padding: 22px 20px; border-top: 1px solid var(--ink-10); }
section h2 { font-size: 26px; margin-bottom: 12px; }

.menu-grid { display:grid; grid-template-columns: 1fr; gap: 12px; }
@media (min-width: 640px) { .menu-grid { grid-template-columns: 1fr 1fr; } }
.menu-card { display:flex; gap:12px; padding: 12px; background: var(--card); border: 1px solid var(--ink-10); border-radius: var(--r); }
.menu-card .thumb { width:72px; height:72px; border-radius: 10px; background: var(--bg-soft) center/cover no-repeat; flex:0 0 auto; display:flex; align-items:center; justify-content:center; font-size: 28px; }
.menu-card .body { flex: 1; min-width: 0; }
.menu-card h4 { font-size: 16px; margin-bottom:2px; }
.menu-card .desc { font-size: 13px; color: var(--ink-50); line-height: 1.4; }
.menu-card .price { font-weight:600; }

.pickup-list { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; }
.pickup-chip { flex: 0 0 auto; padding: 10px 14px; background: var(--card); border: 1px solid var(--ink-10); border-radius: 999px; font-family:'DM Mono',monospace; font-size: 12px; }

.review-row { padding: 12px 0; border-bottom: 1px solid var(--ink-10); }
.review-row .stars { color: #E8943A; font-size: 14px; letter-spacing: 2px; }

.cta-sticky { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg); border-top: 1px solid var(--ink-10); padding: 14px 20px; display:flex; gap: 10px; }
.btn-primary { flex:1; height:48px; border-radius:999px; background: linear-gradient(135deg, var(--coral), var(--coral-deep)); color:#fff; font-weight:700; font-size:15px; }
.btn-ghost { height:48px; padding: 0 18px; border-radius:999px; border:1.5px solid var(--ink-10); color: var(--ink); font-weight:600; font-size:14px; background: var(--card); }

.empty { text-align:center; padding: 40px 20px; color: var(--ink-50); }
</style>
</head>
<body>

<div class="top-bar">
  <a href="/" class="brand">Stoveside</a>
  <a class="btn" href="/app">Browse all</a>
</div>

<div class="hero" id="hero"></div>

<div class="profile-row">
  <div class="avatar" id="avatar"></div>
  <div>
    <div class="eyebrow" id="neighborhood">—</div>
    <div id="chef" style="font-weight:600;">—</div>
  </div>
</div>

<div class="stats-bar" id="statsBar"></div>

<section>
  <h2 id="bio">About</h2>
  <p id="story" class="text-muted" style="white-space: pre-line;"></p>
</section>

<section>
  <h2>Menu</h2>
  <div class="menu-grid" id="menuGrid"></div>
</section>

<section>
  <h2>Next pickup windows</h2>
  <div class="pickup-list" id="pickupList"></div>
</section>

<section>
  <h2>Reviews</h2>
  <div id="reviewsHost"></div>
</section>

<section class="text-muted" style="font-size: 12px;">
  This kitchen operates under California AB 626 (MEHKO). Food is prepared in a permitted home kitchen. Made in a Home Kitchen.
</section>

<div class="cta-sticky">
  <a class="btn-ghost" id="messageBtn" href="#">Message</a>
  <a class="btn-primary" id="orderBtn" href="#">Order</a>
</div>

<!-- JSON-LD is injected at runtime once we have kitchen data. -->
<script id="ldjson" type="application/ld+json"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/config.js"></script>
<script>
(async function () {
  const CFG = window.STOVESIDE_CONFIG || {};
  const path = window.location.pathname.replace(/^\/(k|kitchen)\//, '').replace(/^\/+|\/+$/g, '');
  const slug = path || new URLSearchParams(window.location.search).get('slug');
  if (!slug) { renderEmpty('No kitchen specified'); return; }

  if (!CFG.supabaseUrl || !CFG.supabaseKey || !window.supabase) {
    renderEmpty('Supabase not configured'); return;
  }
  const sb = window.supabase.createClient(CFG.supabaseUrl, CFG.supabaseKey);

  const { data: kitchen } = await sb.from('kitchens').select('*').eq('slug', slug).maybeSingle();
  if (!kitchen || !kitchen.is_live) { renderEmpty('This kitchen isn\u2019t live yet.'); return; }

  const [menuRes, availRes, reviewRes] = await Promise.all([
    sb.from('menu_items').select('*').eq('kitchen_id', kitchen.id).eq('is_available', true).order('sort_order', { ascending: true }),
    sb.from('availability').select('*').eq('kitchen_id', kitchen.id).gte('start_time', new Date().toISOString()).order('start_time').limit(10),
    sb.from('reviews').select('*, customer:profiles!reviews_customer_id_fkey(full_name)').eq('kitchen_id', kitchen.id).order('created_at', { ascending: false }).limit(10),
  ]);

  const menu = menuRes.data || [];
  const avail = availRes.data || [];
  const reviews = reviewRes.data || [];

  document.title = kitchen.name + ' — Stoveside';
  const meta = (document.querySelector('meta[name=description]'));
  if (meta) meta.setAttribute('content', (kitchen.bio || kitchen.story || 'A permitted California home kitchen on Stoveside.').slice(0, 160));

  const hero = document.getElementById('hero');
  if (kitchen.cover_url) hero.style.backgroundImage = `url('${kitchen.cover_url}')`;
  hero.innerHTML = `<div class="hero-inner"><div class="eyebrow" style="color:#FFD5C8;">${esc(kitchen.neighborhood || kitchen.city || 'Home kitchen')}</div><h1>${esc(kitchen.name)}</h1><div class="meta">${esc(kitchen.cuisine || '')} ${kitchen.rating ? ' · ' + Number(kitchen.rating).toFixed(1) + ' \u2605 (' + (kitchen.review_count || 0) + ')' : ''}</div></div>`;

  const avatar = document.getElementById('avatar');
  if (kitchen.photo_url) avatar.style.backgroundImage = `url('${kitchen.photo_url}')`;

  document.getElementById('neighborhood').textContent = kitchen.neighborhood || kitchen.city || '';
  document.getElementById('chef').textContent = kitchen.chef_name ? 'Chef ' + kitchen.chef_name : kitchen.name;

  document.getElementById('statsBar').innerHTML = `
    <div><b>${menu.length}</b> dishes</div>
    <div><b>${avail.length}</b> pickups</div>
    <div><b>${kitchen.rating ? Number(kitchen.rating).toFixed(1) + '★' : 'New'}</b>${kitchen.review_count ? ' · ' + kitchen.review_count + ' reviews' : ''}</div>
  `;

  document.getElementById('bio').textContent = kitchen.bio || 'About';
  document.getElementById('story').textContent = kitchen.story || 'This kitchen hasn\u2019t written their story yet.';

  const menuGrid = document.getElementById('menuGrid');
  menuGrid.innerHTML = menu.length ? menu.map(m => `
    <div class="menu-card">
      <div class="thumb" style="${m.photo_url ? `background-image:url('${m.photo_url}');` : ''}">${m.photo_url ? '' : (m.emoji || '🍽️')}</div>
      <div class="body">
        <h4>${esc(m.name)}</h4>
        <div class="desc">${esc(m.description || '')}</div>
        <div class="price">$${Number(m.price).toFixed(2)}</div>
      </div>
    </div>
  `).join('') : '<div class="empty">Menu is being prepped. Check back soon.</div>';

  const pickupList = document.getElementById('pickupList');
  pickupList.innerHTML = avail.length ? avail.map(a => {
    const d = new Date(a.start_time);
    const e = new Date(a.end_time);
    const day = d.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
    const range = d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' }) + '–' + e.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
    return `<div class="pickup-chip">${day} · ${range}</div>`;
  }).join('') : '<div class="text-muted">No upcoming pickups scheduled.</div>';

  const reviewsHost = document.getElementById('reviewsHost');
  reviewsHost.innerHTML = reviews.length ? reviews.map(r => {
    const stars = '★'.repeat(r.rating) + '<span style="color:#ddd;">' + '★'.repeat(5 - r.rating) + '</span>';
    const name = (r.customer && r.customer.full_name) || 'A customer';
    const reply = r.operator_reply ? `<div style="margin-top:6px; padding:10px; background:var(--bg-soft); border-radius:10px;"><div class="eyebrow">Reply from ${esc(kitchen.chef_name || kitchen.name)}</div>${esc(r.operator_reply)}</div>` : '';
    return `<div class="review-row"><div class="stars">${stars}</div><div style="margin:4px 0; font-weight:600;">${esc(name)}</div><div>${esc(r.body || '')}</div>${reply}</div>`;
  }).join('') : '<div class="text-muted">No reviews yet.</div>';

  document.getElementById('orderBtn').href = '/app?openKitchen=' + encodeURIComponent(kitchen.id);
  document.getElementById('messageBtn').href = '/app?messageKitchen=' + encodeURIComponent(kitchen.id);

  // Inject Restaurant JSON-LD
  const ld = {
    '@context': 'https://schema.org',
    '@type': 'Restaurant',
    name: kitchen.name,
    description: kitchen.bio || kitchen.story || undefined,
    image: kitchen.cover_url || kitchen.photo_url || undefined,
    servesCuisine: kitchen.cuisine || undefined,
    address: kitchen.neighborhood || kitchen.city ? {
      '@type': 'PostalAddress',
      addressLocality: kitchen.city || undefined,
      addressRegion: kitchen.state || 'CA',
      areaServed: kitchen.neighborhood || undefined,
    } : undefined,
    aggregateRating: (kitchen.rating && kitchen.review_count) ? {
      '@type': 'AggregateRating',
      ratingValue: Number(kitchen.rating).toFixed(1),
      reviewCount: kitchen.review_count,
    } : undefined,
  };
  document.getElementById('ldjson').textContent = JSON.stringify(ld);

  function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }

  function renderEmpty(msg){
    document.body.innerHTML = '<div class="container" style="padding:60px 20px; text-align:center;"><h1 style="font-size:32px; margin-bottom:10px;">Kitchen not found</h1><p class="text-muted">' + esc(msg) + '</p><p style="margin-top:18px;"><a href="/app" style="background:#FF6B4A; color:#fff; padding:12px 20px; border-radius:999px; display:inline-block; font-weight:700;">Browse all kitchens</a></p></div>';
  }
})().catch(err => {
  console.error(err);
  document.body.innerHTML = '<div style="padding:60px 20px; text-align:center;"><h1>Something went wrong</h1></div>';
});
</script>
</body>
</html>
